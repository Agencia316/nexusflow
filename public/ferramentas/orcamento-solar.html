<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Orçamento · Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f172a; --s:#1e293b; --s2:#0f172a; --bd:#334155; --bd2:#475569;
  --gold:#f59e0b; --gold-d:rgba(245,158,11,0.12);
  --grn:#4ade80; --grn-d:rgba(74,222,128,0.1);
  --red:#f87171; --red-d:rgba(248,113,113,0.1);
  --wa:#25d366;
  --txt:#e2e8f0; --t2:#cbd5e1; --t3:#64748b;
  --fn:'Inter',sans-serif; --mo:'Fira Code',monospace;
}
body { font-family:var(--fn); background:var(--bg); color:var(--txt); font-size:14px; line-height:1.6; min-height:100vh; }
header { background:var(--s); border-bottom:1px solid var(--bd); padding:14px 24px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.logo-mark { width:38px; height:38px; background:var(--gold-d); border:1px solid rgba(245,158,11,0.4); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; }
.logo-mark img { width:100%; height:100%; object-fit:contain; }
.logo-t { font-size:14px; font-weight:700; }
.logo-s { font-size:11px; color:var(--t3); }
.badge { margin-left:auto; font-family:var(--mo); font-size:10px; color:var(--gold); background:var(--gold-d); border:1px solid rgba(245,158,11,0.3); border-radius:6px; padding:3px 10px; }
.wrap { max-width:820px; margin:0 auto; padding:28px 20px 90px; }
.hero { margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--bd); }
.hero-ey { font-family:var(--mo); font-size:10px; color:var(--gold); letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
.hero h1 { font-size:23px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px; }
.hero h1 span { color:var(--gold); }
.hero p { font-size:13px; color:var(--t2); max-width:560px; }
.step { background:var(--s); border:1px solid var(--bd); border-radius:12px; padding:18px 20px; margin-bottom:12px; }
.step-h { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.step-num { width:26px; height:26px; border-radius:50%; background:var(--s2); border:2px solid var(--gold); color:var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--mo); font-size:11px; flex-shrink:0; }
.step-title { font-size:13px; font-weight:600; }
.step-sub { font-size:11px; color:var(--t3); margin-top:2px; }
.field { margin-bottom:14px; }
.field:last-child { margin-bottom:0; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--t2); margin-bottom:6px; }
.field select, .field input {
  width:100%; padding:10px 12px; border:1.5px solid var(--bd); border-radius:8px;
  background:var(--s2); color:var(--txt); font-size:13px; font-family:var(--fn); outline:none; transition:border .15s;
}
.field select:focus, .field input:focus { border-color:var(--gold); }
.field .hint { font-size:11px; color:var(--t3); margin-top:4px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.toggle { display:flex; gap:8px; margin-bottom:12px; }
.toggle button { flex:1; padding:8px; border:1.5px solid var(--bd); border-radius:8px; background:var(--s2); color:var(--t2); font-size:12px; font-weight:600; cursor:pointer; font-family:var(--fn); transition:all .15s; }
.toggle button.on { border-color:var(--gold); background:var(--gold-d); color:var(--gold); }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 22px; border-radius:10px; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--fn); transition:all .15s; }
.btn-gold { background:var(--gold); color:#0f172a; width:100%; margin-top:4px; }
.btn-gold:hover { opacity:.9; }
.btn-wa { background:var(--wa); color:#053d1c; }
.btn-ghost { background:transparent; border:1.5px solid var(--bd); color:var(--t2); }
.btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
.result { background:var(--s); border:2px solid var(--gold); border-radius:14px; overflow:hidden; margin-top:22px; display:none; }
.result.show { display:block; }
.res-head { background:var(--gold-d); padding:16px 22px; border-bottom:1px solid var(--bd); }
.res-head h2 { font-size:16px; font-weight:800; }
.res-head p { font-size:11px; color:var(--t2); margin-top:2px; }
.res-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
.res-card { padding:16px 20px; border-bottom:1px solid var(--bd); border-right:1px solid var(--bd); }
.res-card:nth-child(3n) { border-right:none; }
.res-label { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.04em; font-family:var(--mo); margin-bottom:4px; }
.res-val { font-size:19px; font-weight:800; font-family:var(--mo); color:var(--gold); }
.res-note { font-size:11px; color:var(--t2); margin-top:2px; }
.res-detail { padding:14px 22px; border-bottom:1px solid var(--bd); }
.res-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(51,65,85,.5); font-size:12px; }
.res-row:last-child { border-bottom:none; }
.res-row-l { color:var(--t2); }
.res-row-v { font-family:var(--mo); font-weight:600; }
.res-actions { padding:16px 22px; display:flex; gap:10px; flex-wrap:wrap; }
.res-actions .btn { flex:1; min-width:150px; }
.res-legal { padding:12px 22px; background:rgba(0,0,0,.2); font-size:10.5px; color:var(--t3); line-height:1.6; }
.err { background:var(--red-d); border:1px solid rgba(248,113,113,.3); color:var(--red); padding:10px 14px; border-radius:8px; font-size:12px; margin-bottom:12px; display:none; }
.err.show { display:block; }
.loading { text-align:center; padding:40px; color:var(--t3); font-size:13px; }
.tagp { font-size:9px; color:var(--gold); }
</style>
</head>

<script>
const SB_URL = 'https://bysrqusnzspphqxxqurm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5c3JxdXNuenNwcGhxeHhxdXJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTg2NTgsImV4cCI6MjA5ODMzNDY1OH0.TAWeqpumnT3BVqXZwlFUID7Cp8fDRnE2WxdiCV4raUw';
const PERF = 0.78;      // performance ratio
const DEGRAD = 0.005;   // degradação anual dos painéis (0,5%/ano)

const params = new URLSearchParams(location.search);
const FIRM_ID = params.get('firm');

async function sb(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  if (!r.ok) throw new Error('Falha ao carregar dados (' + r.status + ')');
  return r.json();
}

const BRL = n => n.toLocaleString('pt-BR', { style:'currency', currency:'BRL', maximumFractionDigits:0 });
const BRL2 = n => n.toLocaleString('pt-BR', { style:'currency', currency:'BRL', minimumFractionDigits:2, maximumFractionDigits:2 });
const NUM = (n,d=0) => n.toLocaleString('pt-BR', { minimumFractionDigits:d, maximumFractionDigits:d });

let DATA = { tariffs:[], panels:[], inverters:[], distributors:[], pricing:[], firm:null };
let last = null;

async function boot() {
  try {
    const [tariffs, brands, pricing, firmRows] = await Promise.all([
      sb('nf_solar_tariffs?select=*&active=eq.true&order=sort_order'),
      sb('nf_solar_brands?select=*&active=eq.true&order=sort_order'),
      sb('nf_solar_pricing?select=*&order=sort_order'),
      FIRM_ID ? sb(`nf_firms?id=eq.${FIRM_ID}&select=name,logo_url,accent_color,primary_color,budget_whatsapp,budget_phone,budget_cnpj,budget_site,budget_address`) : Promise.resolve([]),
    ]);
    DATA.tariffs = tariffs;
    DATA.panels = brands.filter(b => b.type === 'painel');
    DATA.inverters = brands.filter(b => b.type === 'inversor');
    DATA.distributors = brands.filter(b => b.type === 'distribuidor');
    DATA.pricing = pricing;
    DATA.firm = firmRows[0] || null;
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="err show">${e.message}. Recarregue a página.</div>`;
  }
}

function render() {
  const f = DATA.firm;
  if (f) {
    document.getElementById('firmName').textContent = f.name || 'Energia Solar';
    if (f.accent_color) document.documentElement.style.setProperty('--gold', f.accent_color);
    if (f.logo_url) document.getElementById('firmLogo').innerHTML = `<img src="${f.logo_url}" alt="logo">`;
  }
  const opt = (arr, val, lbl) => arr.map(x => `<option value="${x[val]}">${lbl(x)}</option>`).join('');
  const brandOpt = arr => arr.map(b => `<option value="${b.id}">${b.name}${b.is_partner ? ' ⭐' : ''}${b.panel_watt ? ' ('+b.panel_watt+'W)' : ''}</option>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-ey">Proposta em 1 minuto</div>
      <h1>Calculadora de <span>Orçamento Solar</span></h1>
      <p>Preencha os dados do cliente e do consumo. O sistema calcula potência, economia e payback, gera a mensagem pronta para o WhatsApp e o PDF A4 com a sua marca.</p>
    </div>

    <div class="err" id="err"></div>

    <div class="step">
      <div class="step-h"><div class="step-num">1</div><div><div class="step-title">Cliente e região</div><div class="step-sub">Dados que aparecem na proposta</div></div></div>
      <div class="row2">
        <div class="field"><label>Nome do cliente</label><input id="cliNome" placeholder="Ex: João da Silva"></div>
        <div class="field"><label>WhatsApp do cliente</label><input id="cliZap" placeholder="(42) 99999-9999" inputmode="tel"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Cidade</label><input id="cliCidade" placeholder="Irati"></div>
        <div class="field"><label>Região / tarifa</label>
          <select id="regiao">${opt(DATA.tariffs,'id',t=>`${t.region_label} — ${t.concessionaria} (${BRL2(t.tariff_kwh)}/kWh)`)}</select>
        </div>
      </div>
    </div>

    <div class="step">
      <div class="step-h"><div class="step-num">2</div><div><div class="step-title">Consumo de energia</div><div class="step-sub">Informe a conta média OU o consumo</div></div></div>
      <div class="toggle">
        <button id="tgConta" class="on" onclick="setModo('conta')">Valor da conta (R$)</button>
        <button id="tgKwh" onclick="setModo('kwh')">Consumo (kWh/mês)</button>
      </div>
      <div class="field" id="fConta"><label>Conta de luz média por mês (R$)</label><input id="conta" type="number" placeholder="450" inputmode="decimal"><div class="hint">Média dos últimos 12 meses.</div></div>
      <div class="field" id="fKwh" style="display:none"><label>Consumo médio (kWh/mês)</label><input id="kwh" type="number" placeholder="450" inputmode="decimal"></div>
      <div class="field"><label>Tipo de ligação</label>
        <select id="ligacao">
          <option value="30">Monofásica (custo disp. 30 kWh)</option>
          <option value="50">Bifásica (custo disp. 50 kWh)</option>
          <option value="100">Trifásica (custo disp. 100 kWh)</option>
        </select>
      </div>
    </div>

    <div class="step">
      <div class="step-h"><div class="step-num">3</div><div><div class="step-title">Equipamentos</div><div class="step-sub">Marcas vendidas na região · ⭐ = parceiro</div></div></div>
      <div class="row2">
        <div class="field"><label>Painel</label><select id="painel">${brandOpt(DATA.panels)}</select></div>
        <div class="field"><label>Inversor</label><select id="inversor">${brandOpt(DATA.inverters)}</select></div>
      </div>
      <div class="field"><label>Distribuidor / fornecedor</label>
        <select id="distribuidor"><option value="">— não especificar —</option>${brandOpt(DATA.distributors)}</select>
      </div>
    </div>

    <div class="step">
      <div class="step-h"><div class="step-num">4</div><div><div class="step-title">Condições da proposta</div><div class="step-sub">Cobertura, financiamento e projeção</div></div></div>
      <div class="row3">
        <div class="field"><label>Cobertura da conta (%)</label><input id="cobertura" type="number" value="100" min="10" max="130"><div class="hint">Quanto do consumo compensar.</div></div>
        <div class="field"><label>Parcelas (financiamento)</label>
          <select id="parcelas"><option>12</option><option>24</option><option>36</option><option>48</option><option selected>60</option><option>72</option><option>84</option></select>
        </div>
        <div class="field"><label>Juros a.m. (%)</label><input id="juros" type="number" step="0.1" value="1.8"></div>
      </div>
      <div class="field"><label>Reajuste anual da tarifa (%) — projeção 25 anos</label><input id="inflacao" type="number" step="0.5" value="8"><div class="hint">Média histórica da energia no Brasil ~8%/ano. Considera também degradação de ${(DEGRAD*100).toFixed(1)}%/ano dos painéis.</div></div>
    </div>

    <button class="btn btn-gold" onclick="calcular()">☀️ Calcular orçamento</button>

    <div class="result" id="result"></div>
  `;
}

let modo = 'conta';
function setModo(m) {
  modo = m;
  document.getElementById('tgConta').classList.toggle('on', m==='conta');
  document.getElementById('tgKwh').classList.toggle('on', m==='kwh');
  document.getElementById('fConta').style.display = m==='conta' ? 'block' : 'none';
  document.getElementById('fKwh').style.display = m==='kwh' ? 'block' : 'none';
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'), 4000);
}

function priceForKwp(kwp) {
  const tier = DATA.pricing.find(p => kwp >= Number(p.min_kwp) && (p.max_kwp==null || kwp < Number(p.max_kwp)));
  return tier ? Number(tier.price_per_kwp) : 3400;
}

// PMT (Price/Tabela Price) — parcela fixa
function pmt(principal, i, n) {
  if (i <= 0) return principal / n;
  return principal * (i * Math.pow(1+i, n)) / (Math.pow(1+i, n) - 1);
}

// Projeção de N anos com degradação dos painéis + reajuste da tarifa.
// Retorna { serie: [{ano, acumulado}], total, paybackAnos }
function projetar(geracaoMes, consumoMes, tarifa, infla, anos) {
  let acumulado = 0, payback = null;
  const serie = [];
  for (let ano = 1; ano <= anos; ano++) {
    const ger = geracaoMes * Math.pow(1 - DEGRAD, ano - 1);
    const tar = tarifa * Math.pow(1 + infla, ano - 1);
    const economiaAno = Math.min(ger, consumoMes) * tar * 12;
    acumulado += economiaAno;
    serie.push({ ano, acumulado });
  }
  return { serie, total: acumulado };
}

function calcular() {
  const tar = DATA.tariffs.find(t => t.id === document.getElementById('regiao').value);
  const painel = DATA.panels.find(b => b.id === document.getElementById('painel').value);
  const inversor = DATA.inverters.find(b => b.id === document.getElementById('inversor').value);
  const distribuidor = DATA.distributors.find(b => b.id === document.getElementById('distribuidor').value) || null;
  if (!tar || !painel || !inversor) { showErr('Selecione região, painel e inversor.'); return; }

  const tarifa = Number(tar.tariff_kwh);
  const hsp = Number(tar.hsp);
  const disp = Number(document.getElementById('ligacao').value);
  const cobertura = Math.max(10, Number(document.getElementById('cobertura').value) || 100) / 100;
  const nParcelas = Number(document.getElementById('parcelas').value) || 60;
  const juros = (Number(document.getElementById('juros').value) || 0) / 100;
  const infla = (Number(document.getElementById('inflacao').value) || 0) / 100;

  let consumoKwh;
  if (modo === 'conta') {
    const conta = parseFloat(document.getElementById('conta').value);
    if (!conta || conta <= 0) { showErr('Informe o valor da conta.'); return; }
    consumoKwh = conta / tarifa;
  } else {
    consumoKwh = parseFloat(document.getElementById('kwh').value);
    if (!consumoKwh || consumoKwh <= 0) { showErr('Informe o consumo em kWh.'); return; }
  }

  const alvo = consumoKwh * cobertura;
  const kwpIdeal = alvo / (hsp * 30 * PERF);
  const nPaineis = Math.max(1, Math.ceil(kwpIdeal * 1000 / painel.panel_watt));
  const kwp = nPaineis * painel.panel_watt / 1000;
  const geracao = kwp * hsp * 30 * PERF;

  const blend = ((Number(painel.price_factor) + Number(inversor.price_factor)) / 2);
  const precoKwp = priceForKwp(kwp);
  const investimento = kwp * precoKwp * blend;

  const economiaMes = Math.min(geracao, Math.max(consumoKwh - disp, consumoKwh * 0.5)) * tarifa;
  const economiaAno = economiaMes * 12;
  const parcela = pmt(investimento, juros, nParcelas);

  // Projeção 25 anos com degradação + inflação (payback real)
  const proj = projetar(geracao, Math.max(consumoKwh - disp, consumoKwh * 0.5), tarifa, infla, 25);
  let paybackAnos = investimento / economiaAno; // fallback nominal
  for (const p of proj.serie) { if (p.acumulado >= investimento) { paybackAnos = p.ano - 1 + (investimento - (proj.serie[p.ano-2]?.acumulado || 0)) / (p.acumulado - (proj.serie[p.ano-2]?.acumulado || 0)); break; } }
  const economia25 = proj.total - investimento;

  last = {
    cliente: document.getElementById('cliNome').value.trim(),
    zap: document.getElementById('cliZap').value.replace(/\D/g,''),
    cidade: document.getElementById('cliCidade').value.trim(),
    regiao: tar.region_label, concessionaria: tar.concessionaria,
    tarifa, hsp, cobertura, painel, inversor, distribuidor,
    consumoKwh, kwp, nPaineis, geracao, investimento,
    economiaMes, economiaAno, nParcelas, juros, parcela,
    paybackAnos, economia25, proj, infla,
  };
  renderResult();
}

function renderResult() {
  const r = last;
  const paybackTxt = r.paybackAnos < 1 ? `${Math.round(r.paybackAnos*12)} meses` : `${NUM(r.paybackAnos,1)} anos`;
  document.getElementById('result').innerHTML = `
    <div class="res-head">
      <h2>Proposta — ${NUM(r.kwp,2)} kWp</h2>
      <p>${r.cliente ? r.cliente + ' · ' : ''}${r.cidade || r.regiao} · cobertura ${Math.round(r.cobertura*100)}%</p>
    </div>
    <div class="res-grid">
      <div class="res-card"><div class="res-label">Sistema</div><div class="res-val">${NUM(r.kwp,2)} kWp</div><div class="res-note">${r.nPaineis} painéis de ${r.painel.panel_watt}W</div></div>
      <div class="res-card"><div class="res-label">Geração</div><div class="res-val">${NUM(r.geracao)}</div><div class="res-note">kWh por mês</div></div>
      <div class="res-card"><div class="res-label">Economia/mês</div><div class="res-val">${BRL(r.economiaMes)}</div><div class="res-note">${BRL(r.economiaAno)}/ano</div></div>
    </div>
    <div class="res-detail">
      <div class="res-row"><span class="res-row-l">Investimento à vista</span><span class="res-row-v" style="color:var(--gold)">${BRL(r.investimento)}</span></div>
      <div class="res-row"><span class="res-row-l">Financiado (${r.nParcelas}x, ${NUM(r.juros*100,1)}% a.m.)</span><span class="res-row-v">${BRL(r.parcela)}/mês</span></div>
      <div class="res-row"><span class="res-row-l">Retorno do investimento (payback)</span><span class="res-row-v" style="color:var(--grn)">${paybackTxt}</span></div>
      <div class="res-row"><span class="res-row-l">Economia líquida em 25 anos</span><span class="res-row-v" style="color:var(--grn)">${BRL(r.economia25)}</span></div>
      <div class="res-row"><span class="res-row-l">Painel / Inversor</span><span class="res-row-v">${r.painel.name} · ${r.inversor.name}</span></div>
      <div class="res-row"><span class="res-row-l">Tarifa considerada</span><span class="res-row-v">${BRL2(r.tarifa)}/kWh · ${r.concessionaria}</span></div>
    </div>
    <div class="res-actions">
      <button class="btn btn-wa" onclick="enviarWhats()">Enviar no WhatsApp</button>
      <button class="btn btn-ghost" onclick="copiarMsg()">Copiar mensagem</button>
      <button class="btn btn-ghost" onclick="gerarPDF()">Gerar PDF A4</button>
    </div>
    <div class="res-legal">Estimativa comercial não vinculante. Geração com HSP de ${NUM(r.hsp,1)} kWh/m²/dia e desempenho de ${Math.round(PERF*100)}%. Projeção de 25 anos considera degradação de ${(DEGRAD*100).toFixed(1)}%/ano e reajuste de tarifa de ${NUM(r.infla*100,1)}%/ano. Sujeito a visita técnica.</div>
  `;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function mensagem() {
  const r = last, f = DATA.firm || {};
  const nome = r.cliente ? ` ${r.cliente}` : '';
  const paybackTxt = r.paybackAnos < 1 ? `${Math.round(r.paybackAnos*12)} meses` : `${NUM(r.paybackAnos,1)} anos`;
  return [
    `☀️ *Proposta de Energia Solar${f.name ? ' — ' + f.name : ''}*`,
    ``,
    `Olá${nome}! Segue a estimativa para o seu consumo:`,
    ``,
    `🔋 *Sistema:* ${NUM(r.kwp,2)} kWp (${r.nPaineis} painéis ${r.painel.panel_watt}W)`,
    `⚡ *Geração:* ${NUM(r.geracao)} kWh/mês`,
    `💰 *Economia:* ${BRL(r.economiaMes)}/mês (${BRL(r.economiaAno)}/ano)`,
    `🏦 *Investimento:* ${BRL(r.investimento)} à vista`,
    `   ou ${r.nParcelas}x de ${BRL(r.parcela)}`,
    `📈 *Retorno em:* ${paybackTxt}`,
    `🌱 *Economia em 25 anos:* ${BRL(r.economia25)}`,
    ``,
    `Equipamentos: ${r.painel.name} + ${r.inversor.name}`,
    r.distribuidor ? `Fornecedor: ${r.distribuidor.name}` : ``,
    ``,
    `Podemos agendar uma visita técnica gratuita? 😊`,
    f.budget_phone ? `📞 ${f.budget_phone}` : ``,
    f.budget_site ? `🌐 ${f.budget_site}` : ``,
  ].filter(Boolean).join('\n');
}

function enviarWhats() {
  const num = last.zap ? (last.zap.length <= 11 ? '55' + last.zap : last.zap) : '';
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(mensagem())}`, '_blank');
}

function copiarMsg() {
  navigator.clipboard.writeText(mensagem()).then(() => showErr('Mensagem copiada! ✅'), () => showErr('Não foi possível copiar.'));
}

async function loadLogoDataURL(url) {
  try {
    const img = new Image(); img.crossOrigin = 'anonymous';
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
    const c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    return { data: c.toDataURL('image/png'), w: img.naturalWidth, h: img.naturalHeight };
  } catch { return null; }
}

// ── PDF A4 retrato, estruturado ──
async function gerarPDF() {
  const r = last, f = DATA.firm || {};
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = 210, M = 16;
  const accent = f.accent_color || '#f59e0b';
  const rgb = hex => { const n = parseInt(hex.slice(1),16); return [n>>16&255, n>>8&255, n&255]; };
  const [ar,ag,ab] = rgb(accent);
  const ink=[30,41,59], mut=[100,116,139], line=[226,232,240];
  let y = 14;

  const setInk=(c)=>doc.setTextColor(c[0],c[1],c[2]);
  const paybackTxt = r.paybackAnos < 1 ? `${Math.round(r.paybackAnos*12)} meses` : `${NUM(r.paybackAnos,1)} anos`;

  // ── Cabeçalho: logo + empresa + contato ──
  const logo = f.logo_url ? await loadLogoDataURL(f.logo_url) : null;
  if (logo) { const h=15, w=Math.min(38,h*logo.w/logo.h); doc.addImage(logo.data,'PNG',M,y,w,h); }
  const hx = logo ? M+44 : M;
  doc.setFont('helvetica','bold'); doc.setFontSize(15); setInk(ink);
  doc.text(f.name || 'Energia Solar', hx, y+5);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); setInk(mut);
  const c1 = [f.budget_phone, f.budget_whatsapp && ('WhatsApp '+f.budget_whatsapp), f.budget_site].filter(Boolean).join('   ·   ');
  const c2 = [f.budget_cnpj && ('CNPJ '+f.budget_cnpj), f.budget_address].filter(Boolean).join('   ·   ');
  if (c1) doc.text(c1, hx, y+10.5);
  if (c2) doc.text(c2, hx, y+14.5);
  y += 20;
  doc.setDrawColor(ar,ag,ab); doc.setLineWidth(0.8); doc.line(M,y,W-M,y); y += 9;

  // ── Título + cliente + validade ──
  doc.setFont('helvetica','bold'); doc.setFontSize(17); setInk([ar,ag,ab]);
  doc.text('Proposta de Energia Solar', M, y); y += 7;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); setInk(ink);
  doc.text(`Cliente: ${r.cliente || '—'}`, M, y);
  doc.text(`${r.cidade || r.regiao} · ${r.concessionaria}`, W-M, y, { align:'right' }); y += 5;
  setInk(mut); doc.setFontSize(8.5);
  doc.text(`Proposta gerada em ${new Date().toLocaleDateString('pt-BR')} · válida por 7 dias`, M, y); y += 8;

  // ── 3 cards de destaque ──
  const cards = [
    ['SISTEMA', `${NUM(r.kwp,2)} kWp`, `${r.nPaineis} painéis ${r.painel.panel_watt}W`],
    ['GERAÇÃO', `${NUM(r.geracao)} kWh`, 'por mês'],
    ['ECONOMIA', `${BRL(r.economiaMes)}`, `por mês · ${BRL(r.economiaAno)}/ano`],
  ];
  const cw=(W-2*M)/3;
  cards.forEach((c,i)=>{ const x=M+i*cw;
    doc.setFillColor(248,250,252); doc.roundedRect(x,y,cw-3,22,2,2,'F');
    doc.setDrawColor(line[0],line[1],line[2]); doc.setLineWidth(0.2); doc.roundedRect(x,y,cw-3,22,2,2,'S');
    setInk(mut); doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.text(c[0],x+4,y+6);
    setInk([ar,ag,ab]); doc.setFontSize(13); doc.text(c[1],x+4,y+13.5);
    setInk(mut); doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.text(c[2],x+4,y+18.5);
  });
  y += 30;

  // ── Equipamentos ──
  const sect = (t)=>{ setInk([ar,ag,ab]); doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.text(t,M,y); y+=1.5; doc.setDrawColor(ar,ag,ab); doc.setLineWidth(0.4); doc.line(M,y,W-M,y); y+=5.5; };
  const kv = (l,v)=>{ setInk(mut); doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.text(l,M,y); setInk(ink); doc.setFont('helvetica','bold'); doc.text(String(v),W-M,y,{align:'right'}); doc.setDrawColor(line[0],line[1],line[2]); doc.setLineWidth(0.15); doc.line(M,y+1.8,W-M,y+1.8); y+=7; };

  sect('Equipamentos');
  kv('Painéis fotovoltaicos', `${r.nPaineis}× ${r.painel.name} ${r.painel.panel_watt}W`);
  kv('Potência total do sistema', `${NUM(r.kwp,2)} kWp`);
  kv('Inversor', `${r.inversor.name}${r.inversor.is_partner ? ' (parceiro)' : ''}`);
  if (r.distribuidor) kv('Distribuidor / fornecedor', r.distribuidor.name);
  kv('Geração média estimada', `${NUM(r.geracao)} kWh/mês`);
  y += 3;

  // ── Condições financeiras ──
  sect('Condições financeiras');
  kv('Investimento à vista', BRL(r.investimento));
  kv(`Financiamento (${r.nParcelas}x, ${NUM(r.juros*100,1)}% a.m.)`, `${BRL(r.parcela)}/mês`);
  kv('Cobertura do consumo', `${Math.round(r.cobertura*100)}%`);
  kv('Retorno do investimento (payback)', paybackTxt);
  kv('Economia líquida em 25 anos', BRL(r.economia25));
  y += 4;

  // ── Gráfico: economia acumulada vs investimento (25 anos) ──
  sect('Projeção de economia (25 anos)');
  const gx=M, gw=W-2*M, gh=42, gy=y;
  const maxV = Math.max(r.proj.total, r.investimento) * 1.05;
  const marks = [5,10,15,20,25];
  const bw = gw / marks.length;
  // eixo
  doc.setDrawColor(line[0],line[1],line[2]); doc.setLineWidth(0.3); doc.line(gx,gy+gh,gx+gw,gy+gh);
  // linha do investimento
  const invY = gy+gh - (r.investimento/maxV)*gh;
  doc.setDrawColor(248,113,113); doc.setLineWidth(0.5);
  doc.setLineDashPattern([1.2,1.2],0); doc.line(gx,invY,gx+gw,invY); doc.setLineDashPattern([],0);
  setInk([200,80,80]); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
  doc.text(`investimento ${BRL(r.investimento)}`, gx+gw, invY-1.5, {align:'right'});
  // barras
  marks.forEach((ano,i)=>{
    const val = r.proj.serie[ano-1].acumulado;
    const bh = (val/maxV)*gh, bx = gx + i*bw + bw*0.2, bwid = bw*0.6;
    doc.setFillColor(ar,ag,ab); doc.rect(bx, gy+gh-bh, bwid, bh, 'F');
    setInk(mut); doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.text(`${ano}a`, bx+bwid/2, gy+gh+4, {align:'center'});
    setInk(ink); doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.text(BRL(val), bx+bwid/2, gy+gh-bh-1.5, {align:'center'});
  });
  y = gy + gh + 10;

  // ── Rodapé: condições + legal ──
  sect('Condições e garantias');
  setInk(mut); doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  const cond = [
    '• Formas de pagamento: à vista (PIX/transferência) ou financiamento bancário com carência.',
    '• Garantia: painéis 25–30 anos (desempenho), inversor 5–10 anos, instalação 1 ano.',
    '• Prazo de instalação: 1 a 3 dias após aprovação do projeto na concessionária.',
    '• Proposta válida por 7 dias, sujeita a visita técnica e disponibilidade dos equipamentos.',
  ];
  cond.forEach(t=>{ const lines=doc.splitTextToSize(t,W-2*M); doc.text(lines,M,y); y += lines.length*4.4; });
  y += 2;
  doc.setFontSize(7); setInk([148,163,184]);
  const legal = `Estimativa comercial não vinculante. Geração calculada com HSP de ${NUM(r.hsp,1)} kWh/m²/dia e desempenho de ${Math.round(PERF*100)}%. Projeção de 25 anos com degradação de ${(DEGRAD*100).toFixed(1)}%/ano e reajuste de tarifa de ${NUM(r.infla*100,1)}%/ano. Valores sujeitos a análise técnica das condições do telhado, ligação e rede.`;
  doc.text(doc.splitTextToSize(legal, W-2*M), M, y);

  doc.save(`Orcamento-Solar-${(r.cliente||'cliente').replace(/\s+/g,'-')}.pdf`);
}

boot();
</script>
