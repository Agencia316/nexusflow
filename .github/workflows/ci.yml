name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # `next lint` sai com 0 quando só há warnings, então este passo barra
      # apenas erros. Os 17 warnings herdados (quase todos exhaustive-deps)
      # ficam visíveis no log sem travar o pipeline.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # O build só precisa das envs NEXT_PUBLIC_* para instanciar o client do
      # Supabase no escopo do módulo. Nenhuma chamada de rede acontece aqui, então
      # valores placeholder bastam e o CI não precisa de nenhum secret.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
